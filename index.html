<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Choice Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="page1" class="container">
        <h1>Do You Love Me, Holy?</h1>
        <div class="button-group">
            <button onclick="closeTab()" class="btn-left">No, Close</button>
            <button onclick="nextPage()" class="btn-right">Yes, Continue</button>
        </div>
    </div>

    <div id="page2" class="container hidden">
        <div class="heart">
            <div class="heart-text-container">
                <span class="heart-text-name">I love you Holy</span>
                <span class="heart-text-date">9/3/2025</span>
            </div>
        </div>
    </div>

    <script>
        function closeTab() {
            // Note: Browsers usually only allow scripts to close tabs they opened.
            // As a fallback, we'll redirect to a blank page.
            window.close();
            window.location.href = "about:blank";
        }

        function nextPage() {
            document.getElementById('page1').classList.add('hidden');
            document.getElementById('page2').classList.remove('hidden');
            document.body.classList.add('gradient-bg');
        }
    </script>
</body>
</html>
